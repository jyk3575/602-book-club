<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>602 Book Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root {
      --black: #000000;
      --white: #ffffff;
      --gray: #888888;
      --light-gray: #1a1a1a;
      --border: #222222;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── AUTH SCREEN ── */
    #auth-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
      animation: fadeIn 0.8s ease;
    }
    .logo-wrap { text-align: center; margin-bottom: 60px; }
    .logo-svg { width: 200px; margin-bottom: 8px; }
    .logo-sub { font-size: 11px; letter-spacing: 0.3em; color: var(--gray); text-transform: uppercase; }

    .auth-box { width: 100%; max-width: 360px; }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .auth-tab {
      flex: 1; padding: 12px; text-align: center; font-size: 13px;
      letter-spacing: 0.1em; color: var(--gray); cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: all 0.2s;
    }
    .auth-tab.active { color: var(--white); border-bottom-color: var(--white); }

    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-form input {
      background: var(--light-gray); border: 1px solid var(--border);
      color: var(--white); padding: 14px 16px; border-radius: 4px;
      font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .auth-form input:focus { border-color: var(--white); }
    .auth-form input::placeholder { color: var(--gray); }
    .btn-primary {
      background: var(--white); color: var(--black);
      border: none; padding: 14px; border-radius: 4px;
      font-size: 14px; font-weight: 700; font-family: 'Noto Sans KR', sans-serif;
      cursor: pointer; letter-spacing: 0.05em;
      transition: opacity 0.2s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .auth-msg { font-size: 12px; color: var(--gray); text-align: center; margin-top: 8px; min-height: 18px; }
    .auth-msg.error { color: #ff4444; }

    /* ── APP SHELL ── */
    #app-screen { display: none; min-height: 100vh; padding-bottom: 80px; }

    /* NAV */
    .top-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 24px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--black); z-index: 100;
    }
    .nav-logo { width: 80px; }
    .nav-user { font-size: 12px; color: var(--gray); cursor: pointer; }
    .nav-user:hover { color: var(--white); }

    /* BOTTOM TAB */
    .bottom-tab {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; background: var(--black);
      border-top: 1px solid var(--border); z-index: 100;
    }
    .tab-item {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      padding: 12px 0 16px; cursor: pointer; color: var(--gray);
      font-size: 10px; letter-spacing: 0.05em; gap: 4px;
      transition: color 0.2s;
    }
    .tab-item.active { color: var(--white); }
    .tab-item svg { width: 20px; height: 20px; }

    /* PAGES */
    .page { display: none; padding: 24px; animation: fadeIn 0.3s ease; }
    .page.active { display: block; }

    /* HOME */
    .greeting { font-size: 13px; color: var(--gray); margin-bottom: 4px; }
    .greeting-name { font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 0.05em; }

    .ring-section { display: flex; justify-content: center; padding: 36px 0 28px; }
    .ring-container { position: relative; width: 180px; height: 180px; }
    .ring-container svg { transform: rotate(-90deg); }
    .ring-info {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center;
    }
    .ring-pages { font-family: 'Bebas Neue', sans-serif; font-size: 42px; letter-spacing: 0.02em; line-height: 1; }
    .ring-label { font-size: 10px; color: var(--gray); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 4px; }

    .stats-row { display: flex; gap: 10px; margin-bottom: 32px; }
    .stat-card {
      flex: 1; background: var(--light-gray); border-radius: 8px;
      padding: 14px 12px;
    }
    .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.02em; }
    .stat-label { font-size: 10px; color: var(--gray); margin-top: 2px; letter-spacing: 0.05em; }

    .section-head {
      font-size: 11px; letter-spacing: 0.2em; color: var(--gray);
      text-transform: uppercase; margin-bottom: 14px;
    }

    /* LOG BUTTON */
    .log-fab {
      position: fixed; bottom: 80px; right: 24px;
      background: var(--white); color: var(--black);
      border: none; border-radius: 50px; padding: 14px 24px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
      box-shadow: 0 4px 20px rgba(255,255,255,0.15);
      display: flex; align-items: center; gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 99;
    }
    .log-fab:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(255,255,255,0.2); }

    /* FEED */
    .feed-item {
      padding: 16px 0; border-bottom: 1px solid var(--border);
      display: flex; gap: 14px; align-items: flex-start;
    }
    .feed-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--light-gray); display: flex; align-items: center;
      justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .feed-content { flex: 1; }
    .feed-user { font-size: 13px; font-weight: 500; }
    .feed-text { font-size: 12px; color: var(--gray); margin-top: 3px; line-height: 1.5; }
    .feed-time { font-size: 11px; color: #444; margin-top: 6px; }
    .feed-stars { color: var(--white); font-size: 12px; margin-top: 4px; }

    /* BOOKS */
    .book-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .book-card {
      background: var(--light-gray); border-radius: 10px; overflow: hidden;
      cursor: pointer; transition: transform 0.2s;
    }
    .book-card:hover { transform: translateY(-2px); }
    .book-cover {
      height: 120px; background: #2a2a2a;
      display: flex; align-items: center; justify-content: center; font-size: 40px;
    }
    .book-info { padding: 12px; }
    .book-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .book-author { font-size: 11px; color: var(--gray); margin-top: 3px; }
    .book-bar { height: 2px; background: #333; border-radius: 1px; margin-top: 10px; }
    .book-bar-fill { height: 100%; background: var(--white); border-radius: 1px; transition: width 0.5s; }
    .book-status { font-size: 10px; color: var(--gray); margin-top: 6px; letter-spacing: 0.05em; }

    .add-book-btn {
      grid-column: 1 / -1; border: 1px dashed var(--border);
      border-radius: 10px; padding: 20px; text-align: center;
      color: var(--gray); font-size: 13px; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .add-book-btn:hover { border-color: var(--white); color: var(--white); }

    /* PROFILE */
    .profile-header { text-align: center; padding: 20px 0 32px; }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%; background: var(--light-gray);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; margin: 0 auto 14px;
    }
    .profile-username { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 0.05em; }
    .profile-stats { display: flex; justify-content: center; gap: 32px; margin-top: 16px; }
    .profile-stat { text-align: center; }
    .profile-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 24px; }
    .profile-stat-label { font-size: 10px; color: var(--gray); letter-spacing: 0.1em; }

    .streak-bar { display: flex; gap: 4px; margin: 24px 0; }
    .streak-day {
      flex: 1; height: 40px; background: var(--light-gray); border-radius: 4px;
      display: flex; align-items: flex-end; padding-bottom: 4px;
      justify-content: center; font-size: 9px; color: var(--gray);
      flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    }
    .streak-day.done { background: var(--white); }
    .streak-day.done span { color: var(--black); }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.85); z-index: 200;
      align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #111; width: 100%; max-width: 480px;
      border-radius: 20px 20px 0 0; padding: 28px 24px 40px;
      animation: slideUp 0.3s ease;
    }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 22px;
      letter-spacing: 0.05em; margin-bottom: 20px;
    }
    .modal-form { display: flex; flex-direction: column; gap: 12px; }
    .modal-form input, .modal-form select, .modal-form textarea {
      background: var(--light-gray); border: 1px solid var(--border);
      color: var(--white); padding: 12px 14px; border-radius: 6px;
      font-size: 14px; font-family: 'Noto Sans KR', sans-serif;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    .modal-form input:focus, .modal-form select:focus, .modal-form textarea:focus { border-color: var(--white); }
    .modal-form select option { background: #111; }
    .modal-form textarea { resize: none; height: 80px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 8px; }
    .btn-secondary {
      flex: 1; background: transparent; color: var(--gray);
      border: 1px solid var(--border); padding: 12px; border-radius: 6px;
      font-size: 13px; cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
    }
    .star-select { display: flex; gap: 8px; font-size: 24px; cursor: pointer; }
    .star-select span { opacity: 0.3; transition: opacity 0.1s; }
    .star-select span.on { opacity: 1; }

    /* ANIMATIONS */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    .empty-state { text-align: center; padding: 40px 0; color: var(--gray); font-size: 13px; }

    /* SHARE CARD */
    .share-card {
      background: var(--black); color: var(--white);
      border-radius: 20px; padding: 28px 24px 24px;
      font-family: 'Noto Sans KR', sans-serif;
      border: 1px solid var(--border);
    }
    .share-card-label { font-size: 10px; letter-spacing: 4px; color: #555; margin-bottom: 20px; }
    .share-card-pages { font-family: 'Bebas Neue', sans-serif; font-size: 64px; line-height: 1; }
    .share-card-unit { font-size: 11px; color: #555; letter-spacing: 3px; margin-top: 2px; margin-bottom: 20px; }
    .share-card-stats { display: flex; gap: 8px; margin-bottom: 20px; }
    .share-card-stat { flex: 1; background: #111; border-radius: 8px; padding: 12px 10px; }
    .share-card-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 22px; }
    .share-card-stat-label { font-size: 10px; color: #555; margin-top: 3px; }
    .share-card-week { display: flex; gap: 4px; margin-bottom: 20px; }
    .share-card-day { flex: 1; height: 36px; background: var(--white); border-radius: 4px; }
    .share-card-day.off { background: #1a1a1a; }
    .share-card-footer { border-top: 1px solid #1a1a1a; padding-top: 14px; display: flex; align-items: center; justify-content: space-between; }
    .share-card-book { font-size: 11px; color: #444; }
    .share-btn { width: 100%; background: var(--white); color: var(--black); border: none; border-radius: 50px; padding: 14px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; margin-top: 16px; transition: opacity 0.2s; }
    .share-btn:hover { opacity: 0.85; }
    .share-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ── AUTH SCREEN ── -->
<div id="auth-screen">
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 300 140" xmlns="http://www.w3.org/2000/svg">
      <!-- 펼쳐진 책 왼쪽 페이지 -->
      <path d="M150 55 Q100 52 40 65 L40 115 Q100 100 150 105 Z" fill="white"/>
      <!-- 펼쳐진 책 오른쪽 페이지 -->
      <path d="M150 55 Q200 52 260 65 L260 115 Q200 100 150 105 Z" fill="white"/>
      <!-- 책 중간 접힌 부분 -->
      <path d="M150 55 L150 105" stroke="#000" stroke-width="2"/>
      <!-- BOOK 텍스트 -->
      <text x="150" y="46" font-family="Bebas Neue, sans-serif" font-size="52" fill="white" font-style="italic" text-anchor="middle" letter-spacing="3">BOOK</text>
    </svg>
    <div class="logo-sub">602 Book Club</div>
  </div>

  <div class="auth-box">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">로그인</div>
      <div class="auth-tab" onclick="switchTab('signup')">회원가입</div>
    </div>

    <div class="auth-form" id="login-form">
      <input type="email" id="login-email" placeholder="이메일" />
      <input type="password" id="login-pw" placeholder="비밀번호" />
      <button class="btn-primary" onclick="login()">로그인</button>
      <div class="auth-msg" id="login-msg"></div>
    </div>

    <div class="auth-form" id="signup-form" style="display:none">
      <input type="text" id="signup-username" placeholder="닉네임" />
      <input type="email" id="signup-email" placeholder="이메일" />
      <input type="password" id="signup-pw" placeholder="비밀번호 (6자 이상)" />
      <button class="btn-primary" onclick="signup()">가입하기</button>
      <div class="auth-msg" id="signup-msg"></div>
    </div>
  </div>
</div>

<!-- ── APP SCREEN ── -->
<div id="app-screen">
  <nav class="top-nav">
    <svg class="nav-logo" viewBox="0 0 300 140" xmlns="http://www.w3.org/2000/svg">
      <path d="M150 55 Q100 52 40 65 L40 115 Q100 100 150 105 Z" fill="white"/>
      <path d="M150 55 Q200 52 260 65 L260 115 Q200 100 150 105 Z" fill="white"/>
      <path d="M150 55 L150 105" stroke="#000" stroke-width="2"/>
      <text x="150" y="46" font-family="Bebas Neue, sans-serif" font-size="52" fill="white" font-style="italic" text-anchor="middle" letter-spacing="3">BOOK</text>
    </svg>
    <span class="nav-user" onclick="logout()">로그아웃</span>
  </nav>

  <!-- HOME -->
  <div class="page active" id="page-home">
    <div class="greeting">오늘도 읽었나요,</div>
    <div class="greeting-name" id="home-username">—</div>

    <div class="ring-section">
      <div class="ring-container">
        <svg width="180" height="180" viewBox="0 0 180 180">
          <circle cx="90" cy="90" r="78" fill="none" stroke="#1a1a1a" stroke-width="10"/>
          <circle id="ring-progress" cx="90" cy="90" r="78" fill="none" stroke="white" stroke-width="10"
            stroke-dasharray="490" stroke-dashoffset="490"
            stroke-linecap="round"/>
        </svg>
        <div class="ring-info">
          <div class="ring-pages" id="ring-pages">0</div>
          <div class="ring-label">pages today</div>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="stat-streak">0🔥</div>
        <div class="stat-label">연속 독서</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-month">0</div>
        <div class="stat-label">이달 페이지</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="stat-books">0</div>
        <div class="stat-label">완독 권수</div>
      </div>
    </div>

    <div class="section-head">오늘의 목표 — 30페이지</div>
  </div>

  <!-- FEED -->
  <div class="page" id="page-feed">
    <div class="section-head" style="margin-bottom:20px">클럽 피드</div>
    <div id="feed-list"><div class="empty-state">아직 활동이 없어요</div></div>
  </div>

  <!-- BOOKS -->
  <div class="page" id="page-books">
    <div class="section-head" style="margin-bottom:20px">내 서재</div>
    <div class="book-grid" id="book-grid">
      <div class="add-book-btn" onclick="openAddBook()">+ 책 추가하기</div>
    </div>
  </div>

  <!-- PROFILE -->
  <div class="page" id="page-profile">
    <div class="profile-header">
      <div class="profile-avatar">📚</div>
      <div class="profile-username" id="profile-username">—</div>
      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-val" id="pstat-pages">0</div>
          <div class="profile-stat-label">총 페이지</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val" id="pstat-books">0</div>
          <div class="profile-stat-label">완독</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-val" id="pstat-streak">0</div>
          <div class="profile-stat-label">최장 스트릭</div>
        </div>
      </div>
    </div>

    <div class="section-head">최근 7일</div>
    <div class="streak-bar" id="streak-bar"></div>

    <div class="section-head" style="margin-top:24px">완독한 책</div>
    <div id="finished-books"><div class="empty-state">아직 완독한 책이 없어요</div></div>

    <div class="section-head" style="margin-top:32px">내 기록 공유하기</div>
    <div id="share-card-wrap" class="share-card">
      <div class="share-card-label">602 BOOK CLUB</div>
      <div style="font-size:13px; color:#aaa; margin-bottom:4px;" id="sc-name">— 의 이번 주 기록</div>
      <div class="share-card-pages" id="sc-pages">0</div>
      <div class="share-card-unit">PAGES</div>
      <div class="share-card-stats">
        <div class="share-card-stat">
          <div class="share-card-stat-val" id="sc-streak">0🔥</div>
          <div class="share-card-stat-label">연속 독서</div>
        </div>
        <div class="share-card-stat">
          <div class="share-card-stat-val" id="sc-reading">0</div>
          <div class="share-card-stat-label">읽는 중</div>
        </div>
        <div class="share-card-stat">
          <div class="share-card-stat-val" id="sc-done">0</div>
          <div class="share-card-stat-label">완독</div>
        </div>
      </div>
      <div class="share-card-week" id="sc-week"></div>
      <div class="share-card-footer">
        <div class="share-card-book" id="sc-current-book">읽는 중인 책 없음</div>
        <svg width="40" height="22" viewBox="0 0 300 140">
          <path d="M150 55 Q100 52 40 65 L40 115 Q100 100 150 105 Z" fill="white"/>
          <path d="M150 55 Q200 52 260 65 L260 115 Q200 100 150 105 Z" fill="white"/>
          <path d="M150 55 L150 105" stroke="#000" stroke-width="2"/>
          <text x="150" y="46" font-family="Bebas Neue, sans-serif" font-size="52" fill="white" font-style="italic" text-anchor="middle">BOOK</text>
        </svg>
      </div>
    </div>
    <button class="share-btn" id="share-btn" onclick="shareCard()">📸 이미지로 저장 & 공유</button>
  </div>

  <!-- FAB -->
  <button class="log-fab" onclick="openLogModal()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    독서 기록
  </button>

  <!-- BOTTOM TAB -->
  <div class="bottom-tab">
    <div class="tab-item active" onclick="goTab('home',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg>
      홈
    </div>
    <div class="tab-item" onclick="goTab('feed',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      클럽
    </div>
    <div class="tab-item" onclick="goTab('books',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      서재
    </div>
    <div class="tab-item" onclick="goTab('profile',this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      프로필
    </div>
  </div>
</div>

<!-- ── MODALS ── -->
<!-- Log Reading -->
<div class="modal-overlay" id="log-modal">
  <div class="modal">
    <div class="modal-title">독서 기록</div>
    <div class="modal-form">
      <select id="log-book-select"><option value="">책 선택...</option></select>
      <input type="number" id="log-pages" placeholder="오늘 읽은 페이지 수" min="1" />
      <textarea id="log-note" placeholder="한 줄 메모 (선택)"></textarea>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal('log-modal')">취소</button>
        <button class="btn-primary" style="flex:2" onclick="submitLog()">기록하기</button>
      </div>
    </div>
  </div>
</div>

<!-- Add Book -->
<div class="modal-overlay" id="book-modal">
  <div class="modal">
    <div class="modal-title">책 추가</div>
    <div class="modal-form">
      <input type="text" id="book-title-input" placeholder="책 제목" />
      <input type="text" id="book-author-input" placeholder="저자" />
      <input type="number" id="book-pages-input" placeholder="총 페이지 수" min="1" />
      <select id="book-status-input">
        <option value="reading">읽는 중</option>
        <option value="want">읽고 싶어요</option>
        <option value="done">완독</option>
      </select>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal('book-modal')">취소</button>
        <button class="btn-primary" style="flex:2" onclick="submitBook()">추가하기</button>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://hfmirrqvqdzvpmjmpnjr.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhmbWlycnF2cWR6dnBtam1wbmpyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxMjUzMjgsImV4cCI6MjA5MjcwMTMyOH0.4bs1VZe6ONmOagpBqsrHFaGRteqrwMBWtJRND3knbkI';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let currentProfile = null;
let userBooks = [];

// ── AUTH ──
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup')));
  document.getElementById('login-form').style.display = tab==='login' ? 'flex' : 'none';
  document.getElementById('signup-form').style.display = tab==='signup' ? 'flex' : 'none';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  const msg = document.getElementById('login-msg');
  msg.textContent = '로그인 중...'; msg.className = 'auth-msg';
  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) { msg.textContent = '이메일 또는 비밀번호를 확인해주세요.'; msg.className = 'auth-msg error'; }
}

async function signup() {
  const username = document.getElementById('signup-username').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pw = document.getElementById('signup-pw').value;
  const msg = document.getElementById('signup-msg');
  if (!username) { msg.textContent = '닉네임을 입력해주세요.'; msg.className='auth-msg error'; return; }
  if (!email) { msg.textContent = '이메일을 입력해주세요.'; msg.className='auth-msg error'; return; }
  if (pw.length < 6) { msg.textContent = '비밀번호는 6자 이상이어야 해요.'; msg.className='auth-msg error'; return; }
  msg.textContent = '가입 중...'; msg.className = 'auth-msg';
  const { data, error } = await sb.auth.signUp({ email, password: pw });
  if (error) {
    if (error.message.includes('already registered')) {
      msg.textContent = '이미 가입된 이메일이에요.'; 
    } else {
      msg.textContent = '오류: ' + error.message;
    }
    msg.className='auth-msg error'; return;
  }
  if (data.user) {
    // 프로필 생성 (이미 있으면 무시)
    await sb.from('profiles').upsert({ id: data.user.id, username });
    // 이메일 인증 없이 바로 로그인된 경우
    if (data.session) {
      msg.textContent = '✅ 가입 완료!'; msg.className='auth-msg';
    } else {
      msg.textContent = '✅ 가입 완료! 로그인해주세요.'; msg.className='auth-msg';
      switchTab('login');
    }
  }
}

async function logout() {
  await sb.auth.signOut();
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    currentUser = session.user;
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfile = data;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
    document.getElementById('home-username').textContent = currentProfile?.username || '독자';
    document.getElementById('profile-username').textContent = currentProfile?.username || '—';
    loadHome(); loadBooks(); loadFeed(); loadProfile();
  }
});

// ── NAV ──
function goTab(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
}

// ── HOME ──
async function loadHome() {
  if (!currentUser) return;
  const today = new Date().toISOString().split('T')[0];

  // today pages
  const { data: todayLogs } = await sb.from('reading_logs').select('pages_read').eq('user_id', currentUser.id).eq('logged_at', today);
  const todayPages = (todayLogs||[]).reduce((s,l) => s+l.pages_read, 0);
  document.getElementById('ring-pages').textContent = todayPages;
  const pct = Math.min(todayPages / 30, 1);
  const circ = 490;
  document.getElementById('ring-progress').style.strokeDashoffset = circ - circ * pct;

  // month pages
  const monthStart = today.slice(0,7) + '-01';
  const { data: monthLogs } = await sb.from('reading_logs').select('pages_read').eq('user_id', currentUser.id).gte('logged_at', monthStart);
  const monthPages = (monthLogs||[]).reduce((s,l) => s+l.pages_read, 0);
  document.getElementById('stat-month').textContent = monthPages.toLocaleString();

  // finished books
  const { data: finished } = await sb.from('books').select('id').eq('user_id', currentUser.id).eq('status','done');
  document.getElementById('stat-books').textContent = (finished||[]).length;

  // streak
  const streak = await calcStreak();
  document.getElementById('stat-streak').textContent = streak + '🔥';
}

async function calcStreak() {
  const { data: logs } = await sb.from('reading_logs').select('logged_at').eq('user_id', currentUser.id).order('logged_at', {ascending:false});
  if (!logs || logs.length === 0) return 0;
  const dates = [...new Set(logs.map(l => l.logged_at))];
  let streak = 0, cur = new Date();
  for (let d of dates) {
    const dd = new Date(d);
    const diff = Math.round((cur - dd) / 86400000);
    if (diff <= 1) { streak++; cur = dd; }
    else break;
  }
  return streak;
}

// ── FEED ──
async function loadFeed() {
  const { data } = await sb.from('reading_logs').select('*, profiles(username), books(title)').order('created_at', {ascending:false}).limit(20);
  const list = document.getElementById('feed-list');
  if (!data || data.length === 0) { list.innerHTML = '<div class="empty-state">아직 활동이 없어요</div>'; return; }
  list.innerHTML = data.map(log => `
    <div class="feed-item">
      <div class="feed-avatar">📖</div>
      <div class="feed-content">
        <div class="feed-user">${log.profiles?.username || '멤버'}</div>
        <div class="feed-text">${log.books?.title || '책'} · ${log.pages_read}페이지 읽음${log.note ? '<br>💬 '+log.note : ''}</div>
        <div class="feed-time">${timeAgo(log.created_at)}</div>
      </div>
    </div>
  `).join('');
}

function timeAgo(ts) {
  const diff = Date.now() - new Date(ts);
  const m = Math.floor(diff/60000), h = Math.floor(m/60), d = Math.floor(h/24);
  if (d > 0) return d+'일 전';
  if (h > 0) return h+'시간 전';
  if (m > 0) return m+'분 전';
  return '방금';
}

// ── BOOKS ──
async function loadBooks() {
  const { data } = await sb.from('books').select('*').eq('user_id', currentUser.id).order('created_at', {ascending:false});
  userBooks = data || [];
  renderBooks();
  // update log modal select
  const sel = document.getElementById('log-book-select');
  sel.innerHTML = '<option value="">책 선택...</option>' + userBooks.filter(b=>b.status==='reading').map(b=>`<option value="${b.id}">${b.title}</option>`).join('');
}

function renderBooks() {
  const grid = document.getElementById('book-grid');
  const cards = userBooks.map(b => {
    const emojis = {'reading':'📖','want':'📚','done':'✅'};
    const pct = b.total_pages ? Math.min((b.pages_read_total||0)/b.total_pages*100,100) : 0;
    const statusLabel = {'reading':'읽는 중','want':'읽고 싶어요','done':'완독'}[b.status]||'';
    return `<div class="book-card">
      <div class="book-cover">${emojis[b.status]||'📖'}</div>
      <div class="book-info">
        <div class="book-title">${b.title}</div>
        <div class="book-author">${b.author||''}</div>
        <div class="book-bar"><div class="book-bar-fill" style="width:${pct}%"></div></div>
        <div class="book-status">${statusLabel}</div>
      </div>
    </div>`;
  }).join('');
  grid.innerHTML = cards + '<div class="add-book-btn" onclick="openAddBook()">+ 책 추가하기</div>';
}

function openAddBook() { document.getElementById('book-modal').classList.add('open'); }

async function submitBook() {
  const title = document.getElementById('book-title-input').value.trim();
  const author = document.getElementById('book-author-input').value.trim();
  const total_pages = parseInt(document.getElementById('book-pages-input').value)||null;
  const status = document.getElementById('book-status-input').value;
  if (!title) return;
  await sb.from('books').insert({ user_id: currentUser.id, title, author, total_pages, status });
  closeModal('book-modal');
  document.getElementById('book-title-input').value = '';
  document.getElementById('book-author-input').value = '';
  document.getElementById('book-pages-input').value = '';
  loadBooks();
}

// ── LOG ──
function openLogModal() {
  if (userBooks.filter(b=>b.status==='reading').length === 0) {
    alert('먼저 읽고 있는 책을 서재에 추가해주세요!'); return;
  }
  document.getElementById('log-modal').classList.add('open');
}

async function submitLog() {
  const book_id = document.getElementById('log-book-select').value;
  const pages = parseInt(document.getElementById('log-pages').value);
  const note = document.getElementById('log-note').value.trim();
  if (!book_id || !pages) return;
  await sb.from('reading_logs').insert({
    user_id: currentUser.id, book_id, pages_read: pages,
    logged_at: new Date().toISOString().split('T')[0], note: note||null
  });
  closeModal('log-modal');
  document.getElementById('log-pages').value = '';
  document.getElementById('log-note').value = '';
  loadHome(); loadFeed();
}

// ── PROFILE ──
async function loadProfile() {
  const { data: logs } = await sb.from('reading_logs').select('pages_read, logged_at').eq('user_id', currentUser.id).order('logged_at');
  const totalPages = (logs||[]).reduce((s,l)=>s+l.pages_read,0);
  const { data: finished } = await sb.from('books').select('id,title,rating').eq('user_id',currentUser.id).eq('status','done');
  const { data: reading } = await sb.from('books').select('id,title').eq('user_id',currentUser.id).eq('status','reading');
  document.getElementById('pstat-pages').textContent = totalPages.toLocaleString();
  document.getElementById('pstat-books').textContent = (finished||[]).length;

  const streak = await calcStreak();
  document.getElementById('pstat-streak').textContent = streak;

  // 7-day bar
  const bar = document.getElementById('streak-bar');
  const days = ['일','월','화','수','목','금','토'];
  const logDates = new Set((logs||[]).map(l=>l.logged_at));
  const weekDays = Array.from({length:7}).map((_,i)=>{
    const d = new Date(); d.setDate(d.getDate()-6+i);
    return { ds: d.toISOString().split('T')[0], day: days[d.getDay()] };
  });
  bar.innerHTML = weekDays.map(({ds,day})=>{
    const done = logDates.has(ds);
    return `<div class="streak-day ${done?'done':''}"><span>${day}</span></div>`;
  }).join('');

  // finished books
  const fb = document.getElementById('finished-books');
  if (!finished || finished.length===0) { fb.innerHTML='<div class="empty-state">아직 완독한 책이 없어요</div>'; }
  else { fb.innerHTML = finished.map(b=>`
    <div class="feed-item">
      <div class="feed-avatar">✅</div>
      <div class="feed-content">
        <div class="feed-user">${b.title}</div>
        <div class="feed-stars">${b.rating ? '★'.repeat(b.rating)+'☆'.repeat(5-b.rating) : '—'}</div>
      </div>
    </div>
  `).join(''); }

  // 이번 주 페이지
  const weekStart = weekDays[0].ds;
  const weekPages = (logs||[]).filter(l=>l.logged_at>=weekStart).reduce((s,l)=>s+l.pages_read,0);

  // 공유 카드 채우기
  document.getElementById('sc-name').textContent = (currentProfile?.username||'—') + '의 이번 주 기록';
  document.getElementById('sc-pages').textContent = weekPages;
  document.getElementById('sc-streak').textContent = streak + '🔥';
  document.getElementById('sc-reading').textContent = (reading||[]).length;
  document.getElementById('sc-done').textContent = (finished||[]).length;
  document.getElementById('sc-week').innerHTML = weekDays.map(({ds})=>
    `<div class="share-card-day ${logDates.has(ds)?'':'off'}"></div>`
  ).join('');
  if (reading && reading.length > 0) {
    document.getElementById('sc-current-book').textContent = reading[0].title;
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function shareCard() {
  const btn = document.getElementById('share-btn');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  try {
    const card = document.getElementById('share-card-wrap');
    const canvas = await html2canvas(card, { backgroundColor: '#000000', scale: 3, useCORS: true });
    const link = document.createElement('a');
    link.download = '602-bookclub-기록.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    btn.textContent = '✅ 저장 완료!';
    setTimeout(()=>{ btn.disabled=false; btn.textContent='📸 이미지로 저장 & 공유'; }, 2000);
  } catch(e) {
    btn.textContent = '오류가 났어요. 다시 시도해주세요.';
    btn.disabled = false;
  }
}
document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => { if(e.target===m) m.classList.remove('open'); }));
</script>
